<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Border Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald 500 -->
    </linearGradient>
    
    <!-- Inner Target Gradient -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" /> <!-- Indigo 400 -->
      <stop offset="100%" stop-color="#34d399" /> <!-- Emerald 400 -->
    </linearGradient>
    
    <!-- Premium Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base App Icon Card: Sleek slate-950 with gradient border -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="#020617" stroke="url(#brand-grad)" stroke-width="16" />
  
  <!-- Subtle target background ring (grid/measurement context) -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="10 10" />
  
  <!-- Stylized Shooting Target & Crosshairs -->
  <g filter="url(#glow)">
    <!-- Outer scoring ring -->
    <circle cx="256" cy="256" r="130" fill="none" stroke="url(#icon-grad)" stroke-width="20" stroke-linecap="round" />
    
    <!-- Inner scoring ring -->
    <circle cx="256" cy="256" r="75" fill="none" stroke="url(#icon-grad)" stroke-width="14" stroke-linecap="round" />
    
    <!-- Center bullseye (T-Zone/A-Zone center) -->
    <circle cx="256" cy="256" r="22" fill="url(#icon-grad)" />
    
    <!-- Sharp Crosshair Ticks -->
    <line x1="256" y1="85" x2="256" y2="110" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="256" y1="402" x2="256" y2="427" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="85" y1="256" x2="110" y2="256" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="402" y1="256" x2="427" y2="256" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
